<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo Consciente - Monitoramento IA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .dashboard { max-width: 1200px; margin: 0 auto; }
        header { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #34495e; }
        .card.destaque { border-top-color: #e74c3c; }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; color: #7f8c8d; }
        .valor { font-size: 28px; font-weight: bold; color: #2c3e50; }
        .unidade { font-size: 16px; font-weight: normal; color: #95a5a6; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>Painel de Eficiência Energética Assistida por IA</h1>
        <p>Previsão e Monitoramento de Consumo em Tempo Real (Sensor PZEM-004T)</p>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Tensão Atual</h3>
            <div class="valor" id="txt-tensao">0.0 <span class="unidade">V</span></div>
        </div>
        <div class="card">
            <h3>Corrente Atual</h3>
            <div class="valor" id="txt-corrente">0.00 <span class="unidade">A</span></div>
        </div>
        <div class="card">
            <h3>Potência Ativa</h3>
            <div class="valor" id="txt-potencia">0.0 <span class="unidade">W</span></div>
        </div>
        <div class="card destaque">
            <h3>Previsão Próximo Passo (IA)</h3>
            <div class="valor" id="txt-previsto" style="color: #e74c3c;">0.0 <span class="unidade">W</span></div>
        </div>
    </div>

    <div class="chart-container">
        <h2>Tendência e Projeção de Carga Dinâmica</h2>
        <canvas id="chartConsumo" height="120"></canvas>
    </div>
</div>

<script>
    // IMPORTANTE: Insira a URL gerada pelo seu Ngrok aqui ao rodar a API no Colab
    const URL_API = "https://giggling-dormitory-tusk.ngrok-free.dev/";
    const QUANTIDADE_PASSOS_PROJECAO = 6; 

    // Configuração Inicial do Gráfico
    const ctx = document.getElementById('chartConsumo').getContext('2d');
    const chartConsumo = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'Projeção de Potência Futura (Watts)',
                data: [],
                borderColor: '#e74c3c',
                backgroundColor: 'rgba(231, 76, 60, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    async function consumirDadosApi() {
        try {
            // 1. Coleta dados instantâneos e previsão imediata
            const respostaStatus = await fetch(`${URL_API}/api/status_atual`);
            const dadosStatus = await respostaStatus.json();

            if(dadosStatus.leitura_atual) {
                document.getElementById('txt-tensao').innerHTML = `${dadosStatus.leitura_atual.tensao.toFixed(1)} <span class="unidade">V</span>`;
                document.getElementById('txt-corrente').innerHTML = `${dadosStatus.leitura_atual.corrente.toFixed(2)} <span class="unidade">A</span>`;
                document.getElementById('txt-potencia').innerHTML = `${dadosStatus.leitura_atual.potencia.toFixed(1)} <span class="unidade">W</span>`;
                document.getElementById('txt-previsto').innerHTML = `${dadosStatus.previsao_proximo_passo.toFixed(1)} <span class="unidade">W</span>`;
            }

            // 2. Coleta projeção futura de múltiplos passos para alimentar o gráfico
            const respostaPrevisao = await fetch(`${URL_API}/api/previsao_futura?passos=${QUANTIDADE_PASSOS_PROJECAO}`);
            const dadosPrevisao = await respostaPrevisao.json();

            if(dadosPrevisao.valores_projetados) {
                // Atualiza Eixo X e Eixo Y do Gráfico dinamicamente
                chartConsumo.data.labels = Array.from({length: QUANTIDADE_PASSOS_PROJECAO}, (_, idx) => `Passo +${idx + 1}`);
                chartConsumo.data.datasets[0].data = dadosPrevisao.valores_projetados;
                chartConsumo.update();
            }

        } catch (erro) {
            console.error("Falha ao atualizar dados vindos da API Flask:", erro);
        }
    }

    // Executa e define atualização em loop a cada 5 segundos
    consumirDadosApi();
    setInterval(consumirDadosApi, 5000);
</script>
</body>
</html>
